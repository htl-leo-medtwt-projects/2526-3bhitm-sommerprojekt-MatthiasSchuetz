<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../script.js" defer></script>
</head>
<body>
    <div id="header">
        <img id="logo" src="../media/img/logo.png" alt="Logo">
    </div>

    <div id="loginWrapper">
        <h1>Create new User</h1>

        <form class="logRegForm" method="POST" action="../server/register.php">
            <label for="username">New username: </label>
            <input name="username" type="text" required>
            <label for="password">Password: </label>
            <input name="password" type="password" required>
            <label for="password2">Retype Password: </label>
            <input name="password2" type="password" required><br>
            <input id="submitButton" type="submit" name="submit" value="Create new user">
        </form>

        <h2>Already have an account?</h2>
        <p><a id="logRegButton" href="./login.html">Login here</a></p>
    </div>
    
</body>
</html>
